<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员控制台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">管理员控制台</a>
            <div class="d-flex">
                <span class="navbar-text me-3" id="userNameDisplay">欢迎！</span>
                <button class="btn btn-outline-light btn-sm me-2" onclick="showChangePasswordModal()">修改密码</button>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">注销</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4" id="main-content">
        <!-- 导航标签 -->
        <ul class="nav nav-tabs" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="user-manage-tab" data-bs-toggle="tab" data-bs-target="#user-manage" type="button" role="tab">用户管理</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="course-manage-tab" data-bs-toggle="tab" data-bs-target="#course-manage" type="button" role="tab">课程管理</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="my-info-tab" data-bs-toggle="tab" data-bs-target="#my-info" type="button" role="tab">个人信息</button>
            </li>
        </ul>

        <div class="tab-content border border-top-0 bg-white p-3" id="myTabContent">
            <!-- 用户管理 -->
            <div class="tab-pane fade show active" id="user-manage" role="tabpanel">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="m-0">系统用户列表</h5>
                    <button class="btn btn-success btn-sm" onclick="openCreateUserModal()">+ 新建用户</button>
                </div>
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>姓名</th>
                            <th>角色</th>
                            <th>附加信息</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                    </tbody>
                </table>
            </div>

            <!-- 课程管理 -->
            <div class="tab-pane fade" id="course-manage" role="tabpanel">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="m-0">全校课程列表</h5>
                    <button class="btn btn-primary btn-sm" onclick="openCreateCourseModal()">+ 新建课程</button>
                </div>
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>课程名称</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="coursesTableBody">
                    </tbody>
                </table>
            </div>

            <!-- 个人信息 -->
            <div class="tab-pane fade" id="my-info" role="tabpanel">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="m-0">我的个人信息</h5>
                </div>
                <div class="card shadow-sm col-md-6">
                    <div class="card-body" id="adminInfoContent">
                        <p class="text-muted">加载中...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 创建用户的模态框 -->
    <div class="modal fade" id="createUserModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="userModalTitle">新建用户</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
              <form id="createUserForm">
                  <input type="hidden" id="editUserId">
                  <div class="mb-3">
                      <label for="newUserRole">角色类型</label>
                      <select class="form-select" id="newUserRole" onchange="roleChange()">
                          <option value="student">学生</option>
                          <option value="teacher">教师</option>
                          <option value="admin">管理员</option>
                      </select>
                  </div>
                  <div class="mb-3">
                      <label for="newUserName">姓名</label>
                      <input type="text" class="form-control" id="newUserName" required>
                  </div>
                  <div class="mb-3">
                      <label for="newUserPass">密码</label>
                      <input type="text" class="form-control" id="newUserPass" required>
                  </div>

                  <!-- 学生 -->
                  <div id="studentFields">
                      <div class="mb-3">
                          <label for="stuYear">入学年份</label>
                          <input type="text" class="form-control" id="stuYear">
                      </div>
                      <div class="mb-3">
                          <label for="stuMajor">专业</label>
                          <input type="text" class="form-control" id="stuMajor">
                      </div>
                      <div class="mb-3">
                          <label for="stuGroup">班级</label>
                          <input type="text" class="form-control" id="stuGroup">
                      </div>
                  </div>

                  <!-- 教师 -->
                  <div id="teacherFields" class="d-none">
                      <div class="mb-3">
                          <label for="teacherDept">所属学院</label>
                          <input type="text" class="form-control" id="teacherDept">
                      </div>
                  </div>

                  <!-- 管理员 -->
                  <div id="adminFields" class="d-none">
                      <div class="mb-3">
                          <label for="adminLevel">管理等级</label>
                          <input type="text" class="form-control" id="adminLevel">
                      </div>
                  </div>

                  <button type="button" class="btn btn-primary" onclick="createUser()">创建</button>
              </form>
          </div>
        </div>
      </div>
    </div>

    <!-- 创建/修改课程的模态框 -->
    <div class="modal fade" id="createCourseModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="courseModalTitle">新建课程</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
              <form id="createCourseForm">
                  <input type="hidden" id="editCourseId">
                  <div class="mb-3">
                      <label for="newCourseName">课程名称</label>
                      <input type="text" class="form-control" id="newCourseName" required>
                  </div>
                  <div class="mb-3">
                      <label for="newCourseTeacherIds">教师ID列表 (逗号分隔)</label>
                      <input type="text" class="form-control" id="newCourseTeacherIds" placeholder="例如: 2, 5">
                  </div>
                  <button type="button" class="btn btn-primary" onclick="submitCourse()">提交</button>
              </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
