<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师端</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">教师服务控制台</a>
            <div class="d-flex">
                <span class="navbar-text me-3" id="userNameDisplay">欢迎老师！</span>
                <button class="btn btn-outline-light btn-sm me-2" onclick="showChangePasswordModal()">修改密码</button>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">注销</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- 导航标签 -->
        <ul class="nav nav-tabs" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="my-courses-tab" data-bs-toggle="tab" data-bs-target="#my-courses" type="button" role="tab">我的教授课程</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="my-info-tab" data-bs-toggle="tab" data-bs-target="#my-info" type="button" role="tab">个人信息</button>
            </li>
        </ul>

        <div class="tab-content" id="myTabContent">
            <!-- 教授课程 -->
            <div class="tab-pane fade show active p-3 bg-white border border-top-0" id="my-courses" role="tabpanel">
                <p class="text-muted">点击课程右侧的“管理成绩”进入学生名单进行录入/修改分数。</p>
                <table class="table table-hover mt-3 shadow-sm bg-white rounded">
                    <thead class="table-light">
                        <tr>
                            <th>课程ID</th>
                            <th>课程名称</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="myCoursesTableBody">
                    </tbody>
                </table>
            </div>

            <!-- 个人信息 -->
            <div class="tab-pane fade p-3 bg-white border border-top-0" id="my-info" role="tabpanel">
                <div class="card shadow-sm col-md-6">
                    <div class="card-body" id="infoContent">
                        <p class="text-muted">加载中...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 管理成绩的模态框 (Modal) -->
    <div class="modal fade" id="gradesModal" tabindex="-1" aria-labelledby="gradesModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-xl">
        <div class="modal-content">
          <div class="modal-header bg-success text-white">
            <h5 class="modal-title" id="gradesModalLabel">课程成绩管理</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
              <input type="hidden" id="currentCourseId">
              <table class="table table-striped table-bordered text-center align-middle">
                  <thead>
                      <tr>
                          <th>学生ID</th>
                          <th>学生姓名</th>
                          <th>当前成绩</th>
                          <th>录入/修改成绩(填分数)</th>
                      </tr>
                  </thead>
                  <tbody id="studentsTableBody">
                      <!-- JS dynamically populates this -->
                  </tbody>
              </table>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/teacher.js"></script>
</body>
</html>
